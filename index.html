<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>أجورا — مركز</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* ===== Tokens ===== */
:root {
  --emerald: #0D6B4E;
  --emerald-deep: #084833;
  --emerald-soft: #15876A;
  --gold: #C8A84E;
  --gold-soft: #D9BE73;
  --gold-deep: #9F8232;
  --bg: #F7F2E8;
  --bg-2: #F1EADC;
  --surface: #FBF7EE;
  --ink: #1C1917;
  --ink-2: #44403C;
  --muted: #78716C;
  --line: #DCD2BD;
  --line-2: #C9BB9F;
  --serif: "Amiri", Georgia, serif;
  --sans: "Plus Jakarta Sans", system-ui, sans-serif;
  --mono: "JetBrains Mono", ui-monospace, monospace;
  --radius: 14px;
  --ease-out: cubic-bezier(.16,.84,.36,1);
}
[data-theme="dark"] {
  --bg: #14172A;
  --bg-2: #1A1D33;
  --surface: #1E2138;
  --ink: #EDE8E0;
  --ink-2: #C9C2B5;
  --muted: #8A8576;
  --line: #2C3050;
  --line-2: #3A3F60;
  --emerald: #2BA37C;
  --gold: #D9BE73;
  --gold-deep: #C8A84E;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--sans);
  -webkit-font-smoothing: antialiased;
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
}

a { color: inherit; text-decoration: none; }

/* ===== Layout principal — single page, fits viewport ===== */
.page {
  display: grid;
  grid-template-columns: minmax(360px, 5fr) 7fr;
  height: 100vh;
  height: 100dvh;
  width: 100%;
  min-height: 0;
}

/* ===== Colonne gauche : Hero ===== */
.hero {
  position: relative;
  display: flex;
  flex-direction: column;
  padding: clamp(20px, 3vw, 40px) clamp(24px, 3.5vw, 48px);
  overflow: hidden;
  border-left: 1px solid var(--line);
  min-width: 0;
}

/* Rosette de fond — coin haut droit */
.hero-rosette {
  position: absolute;
  right: -25%;
  top: -25%;
  width: 110%;
  aspect-ratio: 1;
  color: var(--emerald);
  opacity: 0.09;
  pointer-events: none;
}
[data-theme="dark"] .hero-rosette { color: var(--gold); opacity: 0.12; }
.hero-rosette svg { width: 100%; height: 100%; }

.hero-rosette-inner {
  position: absolute;
  right: -8%;
  top: -12%;
  width: 55%;
  aspect-ratio: 1;
  color: var(--gold-deep);
  opacity: 0.45;
  pointer-events: none;
}
.hero-rosette-inner svg { width: 100%; height: 100%; }

.hero-top {
  position: relative;
  z-index: 2;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

/* Branding coin */
.hero-brand {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--serif);
}
.hero-brand-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--muted);
}
.hero-brand-name {
  font-family: var(--serif);
  font-size: clamp(16px, 1.6vw, 20px);
}
.hero-brand-mark {
  width: 28px; height: 28px;
  color: var(--gold-deep);
}
.hero-brand-mark svg { width: 100%; height: 100%; }

/* Theme toggle */
.theme-toggle {
  width: 34px; height: 34px;
  border-radius: 50%;
  border: 1px solid var(--line);
  background: var(--surface);
  color: var(--ink);
  display: grid; place-items: center;
  cursor: pointer;
  transition: border-color .2s;
  flex-shrink: 0;
}
.theme-toggle:hover { border-color: var(--gold); }
.theme-toggle svg { width: 14px; height: 14px; }
.theme-toggle .moon { display: none; }
[data-theme="dark"] .theme-toggle .sun { display: none; }
[data-theme="dark"] .theme-toggle .moon { display: block; }

/* Contenu hero */
.hero-content {
  position: relative;
  z-index: 2;
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: flex-end;
  text-align: right;
  gap: clamp(16px, 2.4vw, 28px);
  min-height: 0;
  padding: clamp(12px, 2vh, 24px) 0;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  padding: 6px 14px;
  border: 1px solid var(--line-2);
  border-radius: 999px;
}
.hero-badge-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--emerald-soft);
  animation: pulse 2.4s ease-in-out infinite;
}
[data-theme="dark"] .hero-badge-dot { background: var(--gold); }
@keyframes pulse {
  0%,100% { opacity: .4; transform: scale(.8); }
  50% { opacity: 1; transform: scale(1); }
}

.hero h1 {
  font-family: var(--serif);
  font-size: clamp(34px, 5.4vw, 76px);
  font-weight: 400;
  line-height: 1.05;
  letter-spacing: -0.01em;
  text-wrap: balance;
}
.hero h1 em {
  font-style: italic;
  color: var(--gold-deep);
}
[data-theme="dark"] .hero h1 em { color: var(--gold); }

.hero-sub {
  font-family: var(--serif);
  font-size: clamp(15px, 1.4vw, 19px);
  font-style: italic;
  line-height: 1.6;
  color: var(--ink-2);
  max-width: 540px;
}

/* ===== Colonne droite : Grille projets ===== */
.projects-col {
  display: flex;
  flex-direction: column;
  padding: clamp(20px, 3vw, 32px) clamp(20px, 3vw, 32px);
  min-width: 0;
  min-height: 0;
}

/* Header colonne droite */
.col-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 14px;
  flex-shrink: 0;
}
.col-header-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
}

/* Grille — uniform 3×3, fills available space */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-auto-rows: 1fr;
  gap: clamp(8px, 1vw, 14px);
  flex: 1;
  min-height: 0;
}

/* Carte projet */
.pcard {
  position: relative;
  display: flex;
  flex-direction: column;
  padding: clamp(12px, 1.4vw, 20px);
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  overflow: hidden;
  transition: transform .3s var(--ease-out), border-color .25s, box-shadow .3s var(--ease-out);
  cursor: pointer;
  text-align: right;
  min-height: 0;
}
.pcard:hover {
  transform: translateY(-2px);
  border-color: var(--gold);
  box-shadow: 0 16px 40px -20px rgba(13,107,78,.22), 0 4px 12px -4px rgba(0,0,0,.06);
}
[data-theme="dark"] .pcard:hover {
  box-shadow: 0 16px 40px -20px rgba(216,190,115,.18), 0 4px 12px -4px rgba(0,0,0,.4);
}

.pcard-glyph {
  font-family: var(--serif);
  font-size: clamp(26px, 2.6vw, 38px);
  line-height: 1;
  color: var(--emerald);
  margin-top: auto;
}
.pcard--gold .pcard-glyph { color: var(--gold-deep); }
[data-theme="dark"] .pcard--gold .pcard-glyph { color: var(--gold); }

.pcard-name {
  font-family: var(--serif);
  font-size: clamp(15px, 1.4vw, 20px);
  font-weight: 400;
  letter-spacing: -0.01em;
  margin-top: 6px;
  line-height: 1.15;
}
.pcard-tag {
  font-size: clamp(11px, 0.85vw, 12.5px);
  color: var(--ink-2);
  line-height: 1.45;
  margin-top: 2px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.pcard-status {
  position: absolute;
  top: 12px;
  left: 12px;
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: var(--mono);
  font-size: 8.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
}
.pcard-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--emerald-soft);
}
.pcard--prototype .pcard-dot { background: var(--gold); }

/* Motif coin décoratif */
.pcard-corner {
  position: absolute;
  bottom: 0; left: 0;
  width: 40px; height: 40px;
  color: var(--gold);
  opacity: 0;
  transition: opacity .3s;
  pointer-events: none;
}
.pcard-corner svg { width: 100%; height: 100%; }
.pcard:hover .pcard-corner { opacity: .5; }

/* ===== Animations rosette ===== */
@keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }
@keyframes counter { from { transform: rotate(0); } to { transform: rotate(-360deg); } }
.r-spin { animation: spin 120s linear infinite; transform-origin: 50% 50%; }
.r-counter { animation: counter 160s linear infinite; transform-origin: 50% 50%; }

/* ===== Responsive ===== */
/* Tablette portrait — vertical stack, tout dans le viewport */
@media (max-width: 900px) {
  .page {
    grid-template-columns: 1fr;
    grid-template-rows: minmax(220px, 38dvh) minmax(0, 1fr);
  }
  .hero {
    border-left: none;
    border-bottom: 1px solid var(--line);
    padding: clamp(14px, 2.6vw, 22px) clamp(18px, 3.6vw, 30px);
    min-height: 0;
  }
  .hero-rosette { right: -30%; top: -35%; width: 90%; }
  .hero-rosette-inner { right: -10%; top: -18%; width: 45%; }
  .hero-content {
    padding: clamp(6px, 1.5vh, 12px) 0;
    gap: clamp(8px, 1.6vh, 14px);
  }
  .hero h1 {
    font-size: clamp(30px, 5.4vw, 52px);
    line-height: 1.05;
  }
  .hero-sub {
    font-size: clamp(13px, 1.8vw, 16px);
    line-height: 1.55;
  }
  .projects-col {
    padding: clamp(14px, 2.4vw, 22px);
  }
  .col-header { padding-bottom: 10px; margin-bottom: 10px; }
  .cards-grid {
    grid-template-columns: repeat(3, 1fr);
    gap: clamp(8px, 1.4vw, 12px);
  }
  .pcard {
    padding: clamp(10px, 1.6vw, 14px);
  }
}

/* Téléphone — hero compact, grille 3×3 lisible */
@media (max-width: 640px) {
  .page {
    grid-template-rows: minmax(180px, 32dvh) minmax(0, 1fr);
  }
  .hero {
    padding: 14px 18px;
  }
  .hero-content {
    gap: 10px;
    padding: 4px 0;
  }
  .hero h1 {
    font-size: clamp(24px, 6.8vw, 34px);
    line-height: 1.08;
  }
  .hero-sub {
    font-size: 12.5px;
    line-height: 1.5;
    -webkit-line-clamp: 3;
    display: -webkit-box;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .hero-badge { font-size: 8.5px; padding: 4px 10px; letter-spacing: 0.18em; }
  .hero-brand-name { font-size: 16px; }
  .projects-col {
    padding: 12px 14px 14px;
  }
  .col-header { padding-bottom: 8px; margin-bottom: 8px; }
  .col-header-label { font-size: 9px; }
  .cards-grid {
    gap: 7px;
  }
  .pcard {
    padding: 10px 8px 8px;
    border-radius: 10px;
  }
  .pcard-status {
    top: 7px; left: 7px;
    font-size: 7px;
    letter-spacing: 0.06em;
  }
  .pcard-status .pcard-dot { width: 4px; height: 4px; }
  .pcard-glyph { font-size: 22px; }
  .pcard-name { font-size: 13px; margin-top: 4px; }
  .pcard-tag {
    font-size: 10px;
    line-height: 1.35;
    -webkit-line-clamp: 2;
  }
}

/* Très petits écrans — masquer la tagline pour garder lisible */
@media (max-width: 380px) {
  .pcard-tag { display: none; }
  .pcard-glyph { font-size: 20px; }
  .pcard-name { font-size: 12.5px; }
  .hero h1 { font-size: 22px; }
}

/* Paysage très bas — réduit le hero */
@media (max-height: 600px) and (min-width: 901px) {
  .hero h1 { font-size: clamp(32px, 4.4vw, 56px); }
  .hero-content { gap: 14px; }
}

/* Paysage mobile (h < 500px) — reviens à 2 colonnes pour ne pas écraser */
@media (max-height: 500px) and (orientation: landscape) {
  .page {
    grid-template-columns: minmax(280px, 4fr) 7fr;
    grid-template-rows: 1fr;
  }
  .hero {
    border-left: 1px solid var(--line);
    border-bottom: none;
    padding: 14px 20px;
  }
  .hero h1 { font-size: clamp(22px, 4.4vw, 36px); }
  .hero-sub { font-size: 12px; line-height: 1.45; }
  .projects-col { padding: 12px 14px; }
  .cards-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .pcard { padding: 10px 8px; }
  .pcard-glyph { font-size: 22px; }
  .pcard-name { font-size: 13px; }
  .pcard-tag { font-size: 10px; -webkit-line-clamp: 2; display: -webkit-box; -webkit-box-orient: vertical; overflow: hidden; }
  .pcard-status { top: 7px; left: 7px; font-size: 7.5px; }
}

/* Reduce motion */
@media (prefers-reduced-motion: reduce) {
  .r-spin, .r-counter { animation: none; }
  .hero-badge-dot { animation: none; }
}
</style>
</head>
<body>
<script src="motifs.js"></script>
<script src="projects-data.js"></script>

<div class="page" id="page">

  <!-- ===== HERO ===== -->
  <div class="hero">

    <!-- Rosettes de fond -->
    <div class="hero-rosette r-spin" id="bigRosette"></div>
    <div class="hero-rosette-inner r-counter" id="innerRosette"></div>

    <!-- Top bar : branding + theme toggle -->
    <div class="hero-top">
      <button class="theme-toggle" id="themeToggle" aria-label="تغيير المظهر">
        <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>
        </svg>
        <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>
        </svg>
      </button>
      <div class="hero-brand">
        <span class="hero-brand-label">HUB</span>
        <span class="hero-brand-name">المَنهَل</span>
        <span class="hero-brand-mark" id="logoMark"></span>
      </div>
    </div>

    <!-- Contenu centré -->
    <div class="hero-content">
      <span class="hero-badge">
        <span class="hero-badge-dot"></span>
        مجموعة أعمالي
      </span>
      <h1>المَنهَل — <em>من كل بستان زهرة.</em></h1>
      <p class="hero-sub">
        «الدنيا ملعونة، ملعون ما فيها إلا ذكرُ الله وما والاه، وعالمًا أو متعلمًا»
      </p>
    </div>

  </div>

  <!-- ===== PROJETS ===== -->
  <div class="projects-col">
    <div class="col-header">
      <span class="col-header-label">المشاريع — <span id="projectCount"></span></span>
      <span class="col-header-label">٢٠٢٤ — ٢٠٢٥</span>
    </div>
    <div class="cards-grid" id="projectsCol"></div>
  </div>

</div>

<script>
(function () {
  // --- Theme ---
  const root = document.documentElement;
  const saved = localStorage.getItem('agora-theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  let theme = saved || (prefersDark ? 'dark' : 'light');
  root.dataset.theme = theme;

  document.getElementById('themeToggle').addEventListener('click', () => {
    theme = theme === 'dark' ? 'light' : 'dark';
    root.dataset.theme = theme;
    localStorage.setItem('agora-theme', theme);
  });

  // --- Motifs ---
  document.getElementById('bigRosette').innerHTML = window.AgoraMotifs.rosette16;
  document.getElementById('innerRosette').innerHTML = window.AgoraMotifs.rosette12;
  document.getElementById('logoMark').innerHTML = window.AgoraMotifs.logoMark;

  // --- Projets : URLs Vercel ---
  // ⚠️ Modifie ces URLs avec tes vrais déploiements Vercel.
  // La clé est le `slug` du projet (voir projects-data.js).
  const VERCEL_URLS = {
    fiqhnafs: "https://iqraa-fiqh-nafs.vercel.app",
    tadabbur:    "https://qtadabbur.vercel.app",
    tafsir:   "https://safwattafasir.vercel.app",
    hikam:  "https://hikam.netlify.app",
    sirah:    "https://sirah.vercel.app",
    fikr:    "https://rahiqmaarifa.vercel.app",
    isnad:    "https://isnad.vercel.app",
    duroos:   "https://duroos.vercel.app",
    maktabah: "https://maktabah.vercel.app",
  };

  const projects = window.AgoraProjects;

  // --- Cartes projets ---
  const col = document.getElementById('projectsCol');
  document.getElementById('projectCount').textContent = projects.length;

  function makeCard(p) {
    const href = VERCEL_URLS[p.slug] || p.href || '#';
    const isPrototype = p.status === 'نموذج أولي' || p.status === 'تجريبي';
    const card = document.createElement('a');
    card.href = href;
    card.target = '_blank';
    card.rel = 'noopener noreferrer';
    card.className = `pcard pcard--${p.accent}${isPrototype ? ' pcard--prototype' : ''}`;
    card.innerHTML = `
      <div class="pcard-status">
        <span class="pcard-dot"></span>
        ${p.status}
      </div>
      <div class="pcard-name">${p.name}</div>
      <div class="pcard-tag">${p.tagline}</div>
      <div class="pcard-glyph">${p.glyph}</div>
      <div class="pcard-corner">
        <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="0.6">
          <path d="M0 48 L0 0 L48 48 Z" fill="currentColor" opacity="0.06" stroke="none"/>
          <path d="M0 36 L12 48 M0 24 L24 48 M0 12 L36 48"/>
        </svg>
      </div>
    `;
    return card;
  }

  projects.forEach(p => col.appendChild(makeCard(p)));

})();
</script>
</body>
</html>
